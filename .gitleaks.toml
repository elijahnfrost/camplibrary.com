# Gitleaks config for the secret-scan CI gate.
#
# Extends the default ruleset and allowlists values that look like secrets but are
# intentional, non-sensitive placeholders:
#   - The dummy Clerk keys in lib/auth.ts / scripts/check-env.mjs are detection
#     markers (the decoded value is literally "testsecretkeyforlocaldevonly") used
#     to recognize unconfigured/placeholder keys. They are not real credentials.
#   - .env.example holds empty placeholders only.
[extend]
useDefault = true

[allowlist]
description = "Intentional dummy/placeholder values and test fixtures, not real secrets"
regexTarget = "match"
regexes = [
  # Dummy Clerk markers used to detect unconfigured keys (see lib/auth.ts).
  '''sk_test_dgvzdhnly3jldgtlewzvcmxvy2fszgv2''',
  '''pk_test_zm9vlwjhci0xmjmu''',
  # Hardcoded fixtures in *.test.ts — fake values, never real credentials.
  '''integration-test-invite-secret-[0-9a-z]+''',
  '''invite-admin-token-for-tests-[0-9a-z]+''',
]
paths = [
  '''(^|/)\.env\.example$''',
]
