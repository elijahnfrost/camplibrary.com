name: visual-regression

# Fails the build when a change shifts any surface's layout away from the
# committed baselines (tests/visual/**-snapshots). Runs on macOS to match the
# darwin baselines generated locally with `npm run test:visual:update`.
#
# Cross-OS note: Playwright screenshots are platform-specific (font rasterizer).
# The baselines here are darwin, so this job MUST stay on a macOS runner. To move
# CI to Linux, regenerate the baselines inside the matching Playwright container
# (`mcr.microsoft.com/playwright:v1.61.0-noble`) and run this job in it.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  visual:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      # TEMP (eight-workstream-pass): regenerate darwin baselines ON the runner so
      # they match macos-latest's font rasterizer (the local dev Mac is macOS 26,
      # newer than the runner → sub-tolerance mismatch). Reverted in a follow-up
      # commit; the normal `test:visual` gate is restored after the baselines land.
      - name: Regenerate baselines on runner (TEMP)
        run: npm run test:visual:update
        env:
          CI: "true"

      - name: Upload regenerated baselines (TEMP)
        uses: actions/upload-artifact@v4
        with:
          name: darwin-baselines
          path: tests/visual/surfaces.spec.ts-snapshots/
          retention-days: 3
