name: CI

# Single regression gate: a change that breaks the build, types, lint, tests,
# pulls in a vulnerable dependency, or commits a secret fails here instead of
# shipping silently. Runs on every push to main and on PRs targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the secret scan can inspect every commit.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint (design tokens)
        run: npm run lint:design-tokens

      - name: Lint (CSS hygiene — no new !important / duplicate selector)
        run: npm run lint:css-hygiene

      - name: Lint (architectural boundaries)
        run: npm run lint:boundaries

      - name: Lint (file size ratchet)
        run: npm run lint:file-size

      - name: Dead code (knip — unused files, exports, deps)
        run: npx knip

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Dependency audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Secret scan
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks git . --config .gitleaks.toml --redact --no-banner --exit-code 1
